<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AMIC Sign</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 16px;
      font-family: Arial, sans-serif;
      color: #1f2933;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }

    .toolbar input {
      min-width: 220px;
      padding: 6px 8px;
    }

    .signature-list {
      display: grid;
      gap: 16px;
      max-width: 760px;
    }

    .signature-card {
      border: 1px solid #cbd5e1;
      background: #fff;
    }

    .signature-card header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid #e2e8f0;
    }

    .signature-title {
      font-weight: 700;
    }

    .signature-meta {
      color: #52616f;
      font-size: 13px;
    }

    .signature-pad-wrap {
      padding: 12px;
    }

    .signature-pad {
      display: block;
      width: 100%;
      height: 180px;
      border: 1px solid #94a3b8;
      background: #fff;
      touch-action: none;
    }

    .signature-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .signature-actions {
      display: flex;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .message {
      max-width: 760px;
      padding: 16px;
      color: #52616f;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
    }
  </style>
</head>
<body>
  <h3>Sign</h3>
  <div class="toolbar">
    <input data-key="parent" oninput="update('parent', this.value)" placeholder="Parent">
    <button onclick="submitForm()">Submit</button>
  </div>
  <div id="signature-fields" class="signature-list">
    <div class="message">Loading signature fields...</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad"></script>
  <script src="sign.js"></script>
</body>
</html>
