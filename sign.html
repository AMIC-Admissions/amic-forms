<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AMIC Sign</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 16px;
      font-family: Arial, sans-serif;
      color: #1f2933;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }

    .toolbar input {
      min-width: 220px;
      padding: 6px 8px;
    }

    .toolbar input[type="file"] {
      min-width: 260px;
    }

    #pdf-container {
      width: 100%;
      min-height: 240px;
      overflow-x: auto;
      padding: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
    }

    .pdf-pages {
      display: grid;
      gap: 18px;
      justify-items: start;
    }

    .pdf-page {
      position: relative;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 1px 6px rgba(15, 23, 42, 0.18);
    }

    .pdf-page-canvas {
      display: block;
    }

    .field-layer {
      position: absolute;
      inset: 0;
    }

    .sign-field {
      position: absolute;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 20px;
      min-height: 20px;
      padding: 2px;
      border: 1px solid rgba(37, 99, 235, 0.6);
      background: rgba(255, 255, 255, 0.86);
      overflow: visible;
    }

    .sign-field.invalid {
      border-color: #dc2626;
      background: rgba(254, 242, 242, 0.92);
    }

    .sign-field-label {
      flex: 0 0 auto;
      overflow: hidden;
      color: #334155;
      font-size: 11px;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .field-control {
      flex: 1 1 auto;
      min-width: 0;
      width: 100%;
      height: 100%;
      border: 1px solid #94a3b8;
      border-radius: 0;
      background: #fff;
      font: 14px Arial, sans-serif;
    }

    .field-checkbox {
      align-self: center;
      width: 18px;
      height: 18px;
      margin: auto;
    }

    .signature-pad {
      flex: 1 1 auto;
      display: block;
      width: 100%;
      min-height: 34px;
      border: 1px solid #94a3b8;
      background: #fff;
      touch-action: none;
    }

    .signature-preview {
      flex: 1 1 auto;
      width: 100%;
      min-height: 34px;
      border: 1px solid #94a3b8;
      background: #fff;
    }

    .signature-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .field-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .signed-note {
      color: #166534;
      font-size: 13px;
    }

    .field-error,
    .form-error {
      color: #b91c1c;
      font-size: 13px;
    }

    .field-error {
      position: absolute;
      left: 0;
      top: calc(100% + 2px);
      min-width: 160px;
      padding: 3px 4px;
      background: #fff;
      border: 1px solid #fecaca;
      line-height: 1.2;
    }

    .form-error {
      margin: -8px 0 16px;
    }

    .message {
      padding: 16px;
      color: #52616f;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
    }
  </style>
</head>
<body>
  <h3>Sign</h3>
  <div class="toolbar">
    <input id="pdf-file" type="file" accept="application/pdf" aria-label="PDF file">
    <input data-key="parent" oninput="update('parent', this.value)" placeholder="Parent">
    <button onclick="submitForm()">Submit</button>
  </div>
  <div id="form-error" class="form-error" hidden></div>
  <div id="pdf-container">
    <div class="message">Select a PDF to render fields.</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="pdf.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad"></script>
  <script src="sign.js"></script>
</body>
</html>
